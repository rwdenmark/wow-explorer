server:
  # Hosts like Render inject the listen port via $PORT; default to 8080 locally.
  port: ${PORT:8080}

spring:
  application:
    name: wow-explorer
  # Load the repo-root .env (KEY=VALUE) so BLIZZARD_* and POSTGRES_* resolve when
  # running from the IDE or `mvn spring-boot:run`. Working dir is backend/, so it's
  # one level up. `optional:` keeps tests/CI green when no .env is present.
  config:
    import: "optional:file:../.env[.properties]"
  # Bring up the Postgres container automatically on startup and connect to it.
  # `start-only` leaves it running after the app stops (matches docker compose up -d).
  docker:
    compose:
      file: ../docker-compose.yml
      lifecycle-management: start-only
  datasource:
    url: jdbc:postgresql://localhost:${POSTGRES_PORT:5432}/${POSTGRES_DB:wow_explorer}
    username: ${POSTGRES_USER:wow}
    password: ${POSTGRES_PASSWORD:wow}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  flyway:
    enabled: true
    locations: classpath:db/migration

blizzard:
  client-id: ${BLIZZARD_CLIENT_ID}
  client-secret: ${BLIZZARD_CLIENT_SECRET}
  region: us
  locale: en_US
  oauth-base-url: https://oauth.battle.net
  api-base-url: https://us.api.blizzard.com

raiderio:
  base-url: https://raider.io/api/v1

logging:
  level:
    com.wowexplorer: DEBUG
    org.springframework.web.client.RestClient: INFO
